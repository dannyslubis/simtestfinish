<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Stoikiometri</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        /* Mengatur ruang kosong di luar kanvas menjadi hitam pekat */
        body { 
            background-color: #000000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* Wadah utama game, ukurannya dikunci di 512x288 */
        .game-container { 
            position: relative; 
            width: 512px; 
            height: 288px; 
            background-color: #87CEEB; /* Warna sementara langit game */
            overflow: hidden;
            image-rendering: pixelated; /* Mempertahankan gaya pixel art */
        }

        /* Layar gelap saat pop-up muncul. Transisi dipercepat menjadi 0.1s */
        .overlay-gelap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 10;
            transition: opacity 0.1s ease-out;
            opacity: 0;
        }

        /* Gambar Pop-up Token (popuptoken.png) */
        #gambarPopup {
            position: absolute;
            top: 0; left: 0; width: 512px; height: 288px;
            display: none;
            z-index: 11;
        }

        /* Koordinat F5 - K5 untuk Input Nama 
           (X: 160px, Y: 128px, Lebar: 192px, Tinggi: 32px)
        */
        #inputNamaSiswa {
            position: absolute;
            left: 160px; 
            top: 128px; 
            width: 192px; 
            height: 32px;
            z-index: 12;
            display: none;
            
            /* Styling Teks sesuai permintaan */
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #000000;
            text-align: center;
            
            /* Menghilangkan background agar menyatu dengan gambar pop-up Anda */
            background: transparent;
            border: none;
            outline: none;
        }

        /* Tombol pemicu sementara untuk tes */
        .tombol-tes { position: absolute; top: 10px; left: 10px; z-index: 5; }
    </style>
</head>
<body>

    <div class="game-container" id="areaGame">
        <button class="tombol-tes" onclick="tampilkanPopup()">Simulasi: Selesaikan Quest 7</button>

        <div class="overlay-gelap" id="layarGelap"></div>
        <img src="popuptoken.png" id="gambarPopup" alt="Popup Selesai">
        
        <input type="text" id="inputNamaSiswa" placeholder="Ketik namamu..." autocomplete="off">
    </div>

    <script>
        const urlGAS = "https://script.google.com/macros/s/AKfycbx3M4bWTquedi0yMwfNCUs3BkbPmh4yWolHZaCH_Cukr_1t2yAafuwUpqNIYq0mOxtp/exec";
        
        const areaGame = document.getElementById('areaGame');
        const layarGelap = document.getElementById('layarGelap');
        const gambarPopup = document.getElementById('gambarPopup');
        const inputNama = document.getElementById('inputNamaSiswa');
        let popupAktif = false;

        // Fungsi memunculkan pop-up saat quest selesai
        function tampilkanPopup() {
            layarGelap.style.display = 'block';
            gambarPopup.style.display = 'block';
            inputNama.style.display = 'block';
            
            // Efek pemudaran cepat
            setTimeout(() => { layarGelap.style.opacity = '1'; }, 10);
            
            inputNama.focus(); // Langsung arahkan kursor ke tempat ketik
            popupAktif = true;
        }

        // Mendeteksi klik di dalam area game
        areaGame.addEventListener('click', function(event) {
            if (!popupAktif) return;

            // Mengambil koordinat klik mouse relatif terhadap pojok kiri atas game
            const rect = areaGame.getBoundingClientRect();
            const klikX = event.clientX - rect.left;
            const klikY = event.clientY - rect.top;

            /* Mendeteksi Koordinat Tombol Kirim: F6 - K6 
               Kolom F (X mulai 160) sampai ujung Kolom K (X berakhir 352)
               Baris 6 (Y mulai 160) sampai ujung Baris 6 (Y berakhir 192)
            */
            if (klikX >= 160 && klikX <= 352 && klikY >= 160 && klikY <= 192) {
                prosesKirimData();
            }
        });

        function prosesKirimData() {
            const nama = inputNama.value.trim();
            
            if (nama === "") {
                // Opsional: ganti placeholder jika kosong
                inputNama.placeholder = "Nama harus diisi!";
                return;
            }

            // Ubah teks saat mengirim agar ada indikasi visual bagi pemain
            inputNama.value = "Mengirim...";
            inputNama.disabled = true;

            const tokenRahasia = Math.random().toString(36).substring(2, 7).toUpperCase().padEnd(5, '0');
            const waktuSekarang = new Date().toLocaleString('id-ID');

            const paketData = {
                waktu: waktuSekarang,
                nama: nama,
                token: tokenRahasia
            };

            fetch(urlGAS, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(paketData)
            })
            .then(response => {
                tutupPopup();
                // Di sini Anda bisa menambahkan kode lanjutan, 
                // misalnya Kurori memberikan selamat atau lanjut ke layar penutup.
            })
            .catch(error => {
                inputNama.value = "";
                inputNama.placeholder = "Gagal. Coba lagi!";
                inputNama.disabled = false;
            });
        }

        // Fungsi untuk menutup pop-up dan lanjut bermain
        function tutupPopup() {
            layarGelap.style.opacity = '0';
            setTimeout(() => {
                layarGelap.style.display = 'none';
                gambarPopup.style.display = 'none';
                inputNama.style.display = 'none';
                popupAktif = false;
                
                // Reset input untuk keamanan
                inputNama.value = "";
                inputNama.disabled = false;
            }, 100); // Sinkron dengan durasi transisi CSS
        }
    </script>

</body>
</html>
